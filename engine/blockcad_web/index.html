<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BlockCAD — editor</title>
<style>
  :root {
    --fondo: #0f1116;
    --panel: #171a21;
    --borde: #272c37;
    --texto: #dfe4ec;
    --suave: #8b93a7;
    --acento: #6aa9ff;
    --error: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--fondo);
    color: var(--texto);
    font: 14px/1.5 system-ui, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--borde);
    background: var(--panel);
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  header h1 span { color: var(--suave); font-weight: 400; }
  .acciones { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .separador {
    width: 1px;
    height: 20px;
    background: var(--borde);
    margin: 0 2px;
  }
  .guardado {
    color: var(--suave);
    font-size: 12px;
    opacity: 0;
    transition: opacity .25s;
  }
  .guardado.visible { opacity: 1; }
  button {
    background: #222735;
    color: var(--texto);
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 5px 11px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--acento); color: var(--acento); }

  main { flex: 1; display: flex; min-height: 0; }

  .editor {
    width: 42%;
    min-width: 280px;
    display: flex;
    background: var(--panel);
    border-right: 1px solid var(--borde);
    overflow: hidden;
  }
  .gutter {
    padding: 12px 8px 12px 12px;
    text-align: right;
    color: #4d5566;
    font: 13px/1.6 ui-monospace, Consolas, monospace;
    user-select: none;
    overflow: hidden;
    background: #13161d;
  }
  .gutter div.fallo {
    color: var(--error);
    font-weight: 700;
  }
  textarea::placeholder { color: #4d5566; }
  textarea {
    flex: 1;
    padding: 12px;
    background: transparent;
    color: var(--texto);
    border: 0;
    resize: none;
    outline: none;
    font: 13px/1.6 ui-monospace, Consolas, monospace;
    white-space: pre;
    overflow-x: auto;
  }

  .visor { flex: 1; position: relative; min-width: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  .pista {
    position: absolute;
    left: 12px;
    bottom: 10px;
    color: var(--suave);
    font-size: 12px;
    pointer-events: none;
  }

  footer {
    border-top: 1px solid var(--borde);
    background: var(--panel);
    padding: 8px 16px;
    font-size: 13px;
    color: var(--suave);
    min-height: 35px;
  }
  footer.fallo { color: var(--error); }
</style>
</head>
<body>

<header>
  <h1>BlockCAD <span>— escribe código, mira el modelo</span></h1>
  <div class="acciones">
    <span class="guardado" id="guardado">guardado</span>
    <button id="nuevo" title="Vaciar el editor para empezar un modelo nuevo">Nuevo</button>
    <button id="abrir" title="Abrir un archivo .blockcad o un modelo .json">Abrir</button>
    <button id="guardar" title="Descargar el código como archivo .blockcad">Guardar</button>
    <button id="exportar" title="Descargar el modelo en el formato JSON del motor">Exportar JSON</button>
    <span class="separador"></span>
    <button id="ejemplo">Ejemplo</button>
    <button id="centrar">Centrar</button>
  </div>
  <input type="file" id="archivo" accept=".blockcad,.json,.txt" hidden>
</header>

<main>
  <section class="editor">
    <div class="gutter" id="gutter"></div>
    <textarea id="codigo" spellcheck="false" autocomplete="off"
      placeholder='modelo "Mi construcción"

ladrillo 2x4 en 0,0,0 color rojo
ladrillo 2x4 en 2,0,0 color amarillo'></textarea>
  </section>
  <section class="visor">
    <canvas id="lienzo"></canvas>
    <div class="pista">Arrastra para girar · rueda para acercar · clic derecho para desplazar</div>
  </section>
</main>

<footer id="estado">Cargando…</footer>

<!-- Three.js va incluido en vendor/ (licencia MIT): el visor funciona sin conexión. -->
<script type="importmap">
{
  "imports": {
    "three": "/vendor/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from '/vendor/OrbitControls.js';

// Proporciones reales de LEGO: un stud mide 8 mm de lado y una placa 3,2 mm
// de alto. Con el stud como unidad, la altura de una placa es 0,4.
const PLACA = 0.4;
const RADIO_STUD = 0.3;    // 4,8 mm de diámetro
const ALTO_STUD = 0.225;   // 1,8 mm

const CLAVE = 'blockcad:codigo';

const lienzo = document.getElementById('lienzo');
const areaCodigo = document.getElementById('codigo');
const gutter = document.getElementById('gutter');
const estado = document.getElementById('estado');
const avisoGuardado = document.getElementById('guardado');

const renderer = new THREE.WebGLRenderer({ canvas: lienzo, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const escena = new THREE.Scene();
escena.background = new THREE.Color(0x0f1116);

const camara = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camara.position.set(14, 12, 16);

const controles = new OrbitControls(camara, lienzo);
controles.enableDamping = true;
controles.target.set(2, 2, 2);

escena.add(new THREE.HemisphereLight(0xffffff, 0x333944, 2.2));
const sol = new THREE.DirectionalLight(0xffffff, 1.6);
sol.position.set(8, 16, 10);
escena.add(sol);

const rejilla = new THREE.GridHelper(80, 80, 0x39405060, 0x272c37);
rejilla.material.transparent = true;
rejilla.material.opacity = 0.5;
escena.add(rejilla);

const modelo = new THREE.Group();
escena.add(modelo);

function limpiar(grupo) {
  while (grupo.children.length) {
    const hijo = grupo.children.pop();
    if (hijo.geometry) hijo.geometry.dispose();
    if (hijo.material) hijo.material.dispose();
  }
}

function construir(piezas) {
  limpiar(modelo);

  for (const p of piezas) {
    const alto = p.alto * PLACA;
    const material = new THREE.MeshLambertMaterial({
      color: p.color,
      transparent: p.transparente,
      opacity: p.transparente ? 0.45 : 1,
    });

    const caja = new THREE.BoxGeometry(p.ancho, alto, p.fondo);
    const cuerpo = new THREE.Mesh(caja, material);
    // El motor usa z como altura; Three.js usa y. Además la caja se dibuja
    // desde su centro, mientras que el motor guarda la esquina mínima.
    cuerpo.position.set(
      p.x + p.ancho / 2,
      p.z * PLACA + alto / 2,
      p.y + p.fondo / 2,
    );
    modelo.add(cuerpo);

    const aristas = new THREE.LineSegments(
      new THREE.EdgesGeometry(caja),
      new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 }),
    );
    aristas.position.copy(cuerpo.position);
    modelo.add(aristas);

    if (!p.studs) continue;
    for (let i = 0; i < p.ancho; i++) {
      for (let j = 0; j < p.fondo; j++) {
        const stud = new THREE.Mesh(
          new THREE.CylinderGeometry(RADIO_STUD, RADIO_STUD, ALTO_STUD, 16),
          material,
        );
        stud.position.set(
          p.x + i + 0.5,
          p.z * PLACA + alto + ALTO_STUD / 2,
          p.y + j + 0.5,
        );
        modelo.add(stud);
      }
    }
  }
}

function centrar() {
  if (!modelo.children.length) return;
  const caja = new THREE.Box3().setFromObject(modelo);
  const centro = caja.getCenter(new THREE.Vector3());
  const tamano = caja.getSize(new THREE.Vector3());
  const radio = Math.max(tamano.x, tamano.y, tamano.z) || 4;

  controles.target.copy(centro);
  camara.position.set(
    centro.x + radio * 1.6,
    centro.y + radio * 1.3,
    centro.z + radio * 1.9,
  );
  controles.update();
}

function pintarGutter(fallo) {
  const total = areaCodigo.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= total; i++) {
    html += `<div class="${i === fallo ? 'fallo' : ''}">${i}</div>`;
  }
  gutter.innerHTML = html;
  gutter.scrollTop = areaCodigo.scrollTop;
}

let primeraVez = true;

async function compilar() {
  let datos;
  try {
    const respuesta = await fetch('/api/modelo', {
      method: 'POST',
      body: areaCodigo.value,
    });
    datos = await respuesta.json();
  } catch (error) {
    estado.className = 'fallo';
    estado.textContent = 'No se pudo hablar con el servidor: ' + error.message;
    return;
  }

  if (!datos.ok) {
    estado.className = 'fallo';
    estado.textContent = datos.linea
      ? `Línea ${datos.linea}: ${datos.mensaje}`
      : datos.mensaje;
    pintarGutter(datos.linea);
    return;
  }

  construir(datos.piezas);
  pintarGutter(null);
  estado.className = '';
  const n = datos.piezas.length;
  estado.textContent = `${datos.nombre} — ${n} ${n === 1 ? 'pieza' : 'piezas'}`;

  if (primeraVez && n) {
    centrar();
    primeraVez = false;
  }
}

// --- Guardado -------------------------------------------------------------

let avisoTemporizador;

function guardarEnNavegador() {
  try {
    localStorage.setItem(CLAVE, areaCodigo.value);
  } catch (error) {
    // Modo privado o almacenamiento lleno: no es motivo para romper el editor,
    // pero el usuario debe saber que su código no se está guardando solo.
    estado.className = 'fallo';
    estado.textContent = 'No se pudo guardar en este navegador: ' + error.message;
    return;
  }
  avisoGuardado.classList.add('visible');
  clearTimeout(avisoTemporizador);
  avisoTemporizador = setTimeout(() => avisoGuardado.classList.remove('visible'), 900);
}

function nombreArchivo(extension) {
  const linea = areaCodigo.value.match(/^\s*modelo\s+"([^"]*)"/m);
  const base = (linea ? linea[1] : 'modelo').trim() || 'modelo';
  return base.replace(/[^\p{L}\p{N}._-]+/gu, '_') + extension;
}

function descargar(nombre, contenido, tipo) {
  const url = URL.createObjectURL(new Blob([contenido], { type: tipo }));
  const enlace = document.createElement('a');
  enlace.href = url;
  enlace.download = nombre;
  enlace.click();
  URL.revokeObjectURL(url);
}

// --- Eventos --------------------------------------------------------------

let temporizador;
function alEscribir() {
  pintarGutter(null);
  // El código se guarda aunque no compile: perder trabajo a medias sería peor
  // que perderlo terminado.
  guardarEnNavegador();
  clearTimeout(temporizador);
  temporizador = setTimeout(compilar, 400);
}

areaCodigo.addEventListener('input', alEscribir);
areaCodigo.addEventListener('scroll', () => { gutter.scrollTop = areaCodigo.scrollTop; });
document.getElementById('centrar').addEventListener('click', centrar);

// Sustituir lo escrito sin avisar sería destruir trabajo de un clic.
function puedoReemplazar() {
  return !areaCodigo.value.trim()
    || confirm('Se reemplazará el código actual. ¿Seguir?');
}

function reemplazar(codigo) {
  areaCodigo.value = codigo;
  guardarEnNavegador();
  primeraVez = true;
  compilar();
}

document.getElementById('nuevo').addEventListener('click', () => {
  if (!puedoReemplazar()) return;
  reemplazar('');
  areaCodigo.focus();
});

document.getElementById('ejemplo').addEventListener('click', async () => {
  if (!puedoReemplazar()) return;
  const r = await fetch('/api/ejemplo');
  reemplazar((await r.json()).codigo);
});

document.getElementById('guardar').addEventListener('click', () => {
  descargar(nombreArchivo('.blockcad'), areaCodigo.value, 'text/plain;charset=utf-8');
});

const entradaArchivo = document.getElementById('archivo');
document.getElementById('abrir').addEventListener('click', () => {
  if (!puedoReemplazar()) return;
  entradaArchivo.click();
});
entradaArchivo.addEventListener('change', async () => {
  const archivo = entradaArchivo.files[0];
  if (!archivo) return;
  let texto = await archivo.text();
  entradaArchivo.value = '';   // permite reabrir el mismo archivo

  // Abrir debe entender lo que este mismo editor escribe, y eso incluye el
  // JSON de "Exportar JSON". El servidor lo convierte de vuelta a código.
  if (texto.trimStart().startsWith('{')) {
    const respuesta = await fetch('/api/importar', { method: 'POST', body: texto });
    const datos = await respuesta.json();
    if (!datos.ok) {
      estado.className = 'fallo';
      estado.textContent = `No se pudo abrir ${archivo.name}: ${datos.mensaje}`;
      return;
    }
    texto = datos.codigo;
  }

  reemplazar(texto);
});

document.getElementById('exportar').addEventListener('click', async () => {
  const respuesta = await fetch('/api/json', { method: 'POST', body: areaCodigo.value });
  const datos = await respuesta.json();
  if (!datos.ok) {
    estado.className = 'fallo';
    estado.textContent = datos.linea
      ? `No se puede exportar. Línea ${datos.linea}: ${datos.mensaje}`
      : `No se puede exportar. ${datos.mensaje}`;
    pintarGutter(datos.linea);
    return;
  }
  descargar(nombreArchivo('.blockcad.json'), datos.json, 'application/json;charset=utf-8');
});

// El tabulador debe indentar, no saltar de campo: el lenguaje usa bloques.
areaCodigo.addEventListener('keydown', (evento) => {
  if (evento.key !== 'Tab') return;
  evento.preventDefault();
  const inicio = areaCodigo.selectionStart;
  const fin = areaCodigo.selectionEnd;
  areaCodigo.value = areaCodigo.value.slice(0, inicio) + '    ' + areaCodigo.value.slice(fin);
  areaCodigo.selectionStart = areaCodigo.selectionEnd = inicio + 4;
  alEscribir();
});

function ajustar() {
  const ancho = lienzo.clientWidth;
  const alto = lienzo.clientHeight;
  if (!ancho || !alto) return;
  renderer.setSize(ancho, alto, false);
  camara.aspect = ancho / alto;
  camara.updateProjectionMatrix();
}
addEventListener('resize', ajustar);

function bucle() {
  requestAnimationFrame(bucle);
  ajustar();
  controles.update();
  renderer.render(escena, camara);
}
bucle();

// Al abrir, mandan tus cambios: el ejemplo solo aparece la primera vez.
async function arrancar() {
  let guardado = null;
  try {
    guardado = localStorage.getItem(CLAVE);
  } catch (error) {
    guardado = null;
  }

  // `null` es «nunca has usado el editor» y trae el ejemplo. Una cadena
  // vacía es «pulsaste Nuevo», y entonces el lienzo debe seguir en blanco.
  if (guardado !== null) {
    areaCodigo.value = guardado;
  } else {
    const respuesta = await fetch('/api/ejemplo');
    areaCodigo.value = (await respuesta.json()).codigo;
  }
  compilar();
}
arrancar();
</script>
</body>
</html>
