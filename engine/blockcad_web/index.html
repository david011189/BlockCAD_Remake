<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BlockCAD — editor</title>
<style>
  :root {
    --fondo: #0f1116;
    --panel: #171a21;
    --borde: #272c37;
    --texto: #dfe4ec;
    --suave: #8b93a7;
    --acento: #6aa9ff;
    --error: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--fondo);
    color: var(--texto);
    font: 14px/1.5 system-ui, "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--borde);
    background: var(--panel);
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  header h1 span { color: var(--suave); font-weight: 400; }
  .acciones { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .separador {
    width: 1px;
    height: 20px;
    background: var(--borde);
    margin: 0 2px;
  }
  .guardado {
    color: var(--suave);
    font-size: 12px;
    opacity: 0;
    transition: opacity .25s;
  }
  .guardado.visible { opacity: 1; }
  #restantes { color: var(--suave); font-size: 12px; }
  #restantes.agotado { color: var(--error); }
  button {
    background: #222735;
    color: var(--texto);
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 5px 11px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--acento); color: var(--acento); }

  main { flex: 1; display: flex; min-height: 0; }

  .editor {
    width: 42%;
    min-width: 280px;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border-right: 1px solid var(--borde);
    overflow: hidden;
  }
  .fuente { flex: 1; display: flex; min-height: 0; overflow: hidden; }

  .consola {
    border-top: 1px solid var(--borde);
    background: #13161d;
    padding: 10px 12px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .consola textarea {
    background: var(--panel);
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 8px 10px;
    resize: vertical;
    min-height: 44px;
  }
  .consola textarea:focus { border-color: var(--acento); }
  .consola-pie { display: flex; align-items: center; gap: 10px; }
  button.primario {
    background: #2f7d4f;
    border-color: #3b9e63;
    color: #eafaf0;
  }
  button.primario:hover { background: #38955e; border-color: #56c184; color: #fff; }
  #consola-mensaje {
    font-size: 12px;
    color: var(--suave);
    white-space: pre-line;
    line-height: 1.4;
    max-height: 116px;
    overflow-y: auto;
  }
  #consola-mensaje.fallo { color: var(--error); }
  #consola-mensaje.hecho { color: #6fcf97; }
  /* La ayuda va en dos columnas reales: la orden y lo que hace no pueden
     leerse como una sola frase. */
  #consola-mensaje.ayuda {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 14px;
    align-items: baseline;
  }
  #consola-mensaje.ayuda code {
    font: 12px/1.4 ui-monospace, Consolas, monospace;
    color: var(--acento);
  }
  .gutter {
    padding: 12px 8px 12px 12px;
    text-align: right;
    color: #4d5566;
    font: 13px/1.6 ui-monospace, Consolas, monospace;
    user-select: none;
    overflow: hidden;
    background: #13161d;
  }
  .gutter div.fallo {
    color: var(--error);
    font-weight: 700;
  }
  .gutter div.elegida {
    color: #63b3ed;
    font-weight: 700;
  }
  textarea::placeholder { color: #4d5566; }
  textarea {
    flex: 1;
    padding: 12px;
    background: transparent;
    color: var(--texto);
    border: 0;
    resize: none;
    outline: none;
    font: 13px/1.6 ui-monospace, Consolas, monospace;
    white-space: pre;
    overflow-x: auto;
  }

  .visor { flex: 1; position: relative; min-width: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  #paleta {
    position: absolute;
    top: 8px;
    right: 22px;
    bottom: 22px;
    width: 190px;
    overflow-y: auto;
    background: rgba(19, 22, 29, 0.92);
    border: 1px solid #2a3040;
    border-radius: 8px;
    padding: 6px;
  }
  #paleta button {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    margin: 2px 0;
    padding: 4px 8px;
    background: #1d2230;
    color: #cdd4e0;
    border: 1px solid transparent;
    border-radius: 5px;
    font: 12px ui-monospace, Consolas, monospace;
    cursor: pointer;
  }
  #paleta button:hover { border-color: #3a4560; }
  #paleta button.armada { border-color: #63b3ed; color: #63b3ed; }
  #mano.armada { border-color: #63b3ed; color: #63b3ed; }
  .editor.oculto { display: none; }
  #codigo-visible.armada { border-color: #63b3ed; color: #63b3ed; }
  #barra-x, #barra-y {
    position: absolute;
    margin: 0;
    accent-color: #4a5468;
    opacity: 0.6;
  }
  #barra-x:hover, #barra-y:hover { opacity: 1; }
  #barra-x {
    left: 4px;
    right: 22px;
    bottom: 2px;
    width: auto;
    height: 14px;
  }
  /* De pie en el borde derecho, con el modo de escritura vertical: sin
     rotaciones que la dejen atravesada en medio del visor. */
  #barra-y {
    top: 4px;
    bottom: 22px;
    right: 2px;
    width: 14px;
    height: auto;
    writing-mode: vertical-rl;
  }
  .pista {
    position: absolute;
    left: 12px;
    bottom: 22px;
    color: var(--suave);
    font-size: 12px;
    pointer-events: none;
  }

  footer {
    border-top: 1px solid var(--borde);
    background: var(--panel);
    padding: 8px 16px;
    font-size: 13px;
    color: var(--suave);
    min-height: 35px;
  }
  footer.fallo { color: var(--error); }
  footer.aviso { color: #e0a458; }
</style>
</head>
<body>

<header>
  <h1>BlockCAD <span>— escribe código, mira el modelo</span></h1>
  <div class="acciones">
    <span id="restantes" hidden></span>
    <span class="guardado" id="guardado">guardado</span>
    <button id="nuevo" title="Vaciar el editor para empezar un modelo nuevo">Nuevo</button>
    <button id="abrir" title="Abrir un archivo .blockcad o un modelo .json">Abrir</button>
    <button id="guardar" title="Descargar el código como archivo .blockcad">Guardar</button>
    <button id="exportar" title="Descargar el modelo en el formato JSON del motor">Exportar JSON</button>
    <span class="separador"></span>
    <button id="piezas">Piezas</button>
    <button id="ejemplo">Ejemplo</button>
    <button id="codigo-visible" title="Ocultar o mostrar el panel de codigo, para ver el diseño entero">Codigo</button>
    <button id="mano" title="Con la mano, el clic izquierdo agarra el plano y lo arrastra (tecla H)">✋ Mano</button>
    <button id="centrar">Centrar</button>
  </div>
  <input type="file" id="archivo" accept=".blockcad,.json,.txt" hidden>
</header>

<main>
  <section class="editor">
    <div class="fuente">
      <div class="gutter" id="gutter"></div>
      <textarea id="codigo" spellcheck="false" autocomplete="off"
        placeholder='modelo "Mi construcción"

ladrillo 2x4 en 0,0,0 color rojo
ladrillo 2x4 en 2,0,0 color amarillo'></textarea>
    </div>

    <div class="consola">
      <textarea id="orden" spellcheck="false" autocomplete="off" rows="3"
        placeholder="Escribe una pieza o una orden. Prueba con: ayuda"></textarea>
      <div class="consola-pie">
        <button id="enviar" class="primario">enviar</button>
        <span id="consola-mensaje"></span>
      </div>
    </div>
  </section>
  <section class="visor">
    <canvas id="lienzo"></canvas>
    <div id="paleta" hidden></div>
    <input type="range" id="barra-x" min="0" max="100" value="50" title="Desplazar la vista a lo ancho">
    <input type="range" id="barra-y" min="0" max="100" value="50" title="Desplazar la vista en profundidad">
    <div class="pista">Arrastra para girar · rueda para acercar · clic en una pieza para ver su línea · clic derecho: girar o desconectar · arrastrar con el derecho desplaza</div>
  </section>
</main>

<footer id="estado">Cargando…</footer>

<script>
  // Abierta como archivo (file://) esta página no puede funcionar: compilar,
  // las mallas y el propio Three.js llegan por su servidor, y el navegador
  // ni siquiera carga el módulo principal desde el disco. Por eso este aviso
  // vive FUERA del módulo: es lo único que llega a ejecutarse, y sin él la
  // página se queda en «Cargando…» para siempre, que no explica nada.
  if (location.protocol === 'file:') {
    const estado = document.getElementById('estado');
    estado.className = 'fallo';
    estado.textContent =
      'Esta página necesita su servidor: ejecuta "python -m blockcad_web" '
      + 'en la carpeta engine y se abrirá sola en la dirección buena.';
  }
</script>

<!-- Three.js va incluido en vendor/ (licencia MIT): el visor funciona sin conexión. -->
<script type="importmap">
{
  "imports": {
    "three": "/vendor/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from '/vendor/OrbitControls.js';

// El motor manda todo en LDU (1 LDU = 0,4 mm). Aquí se dibuja tomando el
// stud como unidad, así que basta con dividir: un stud son 20 LDU. Las
// proporciones salen solas y ya no hay que escalar la altura aparte.
const LDU = 1 / 20;
const CLAVE = 'blockcad:codigo';

const lienzo = document.getElementById('lienzo');
const areaCodigo = document.getElementById('codigo');
const gutter = document.getElementById('gutter');
const estado = document.getElementById('estado');
const avisoGuardado = document.getElementById('guardado');

const renderer = new THREE.WebGLRenderer({ canvas: lienzo, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const escena = new THREE.Scene();
// Ni muy oscuro ni muy claro: el negro de LEGO es #1B1B1B y el blanco
// #F4F4F4, así que el fondo tiene que separarse de los dos. Con el fondo casi
// negro de antes, una viga negra desaparecía.
escena.background = new THREE.Color(0x39404e);

const camara = new THREE.PerspectiveCamera(45, 1, 0.1, 500);
camara.position.set(14, 12, 16);

const controles = new OrbitControls(camara, lienzo);
controles.enableDamping = true;
controles.target.set(2, 2, 2);

escena.add(new THREE.HemisphereLight(0xffffff, 0x333944, 2.2));
const sol = new THREE.DirectionalLight(0xffffff, 1.6);
sol.position.set(8, 16, 10);
escena.add(sol);

// Ojo: un color son seis dígitos. El valor que había aquí antes tenía ocho,
// se salía del rango y la rejilla acababa de un tono cualquiera.
const rejilla = new THREE.GridHelper(80, 80, 0x525b6b, 0x464e5c);
rejilla.material.transparent = true;
rejilla.material.opacity = 0.6;
escena.add(rejilla);

// Todo el modelo vive dentro de este grupo, y dentro se habla en LDU y con
// los ejes del motor: X e Y horizontales, Z hacia arriba.
//
// El grupo hace las dos conversiones de una vez. Antes se intercambiaban Y y Z
// pieza a pieza, y eso no es un giro sino un reflejo: a una caja simétrica le
// da igual, pero a una malla le invierte las normales y se ilumina del revés.
// Un cuarto de vuelta sobre X sí es un giro, y además deja el código de dentro
// hablando el mismo idioma que el motor.
const modelo = new THREE.Group();
modelo.rotation.x = -Math.PI / 2;
modelo.scale.setScalar(LDU);
escena.add(modelo);

// Las mallas se piden una vez y se quedan: un modelo repite pocas piezas
// muchas veces. Cada entrada trae sus grupos de color: el grupo "16" es el
// cuerpo pintable (colorFijo null) y el resto son dibujos de color fijo,
// como la pupila de los ojos, que es negra la pinte quien la pinte.
const mallas = new Map();

// Qué hex pinta cada código fijo de LDraw. Lo manda el servidor junto con
// las mallas que lo usan.
const coloresLdraw = {};

async function pedirMallas(nombres) {
  const faltan = [...new Set(nombres)].filter((n) => n && !mallas.has(n));
  if (!faltan.length) return;

  const respuesta = await fetch('/api/mallas', {
    method: 'POST',
    body: JSON.stringify(faltan),
  });
  const recibidas = await respuesta.json();
  Object.assign(coloresLdraw, recibidas.colores_ldraw || {});

  for (const nombre of faltan) {
    const porColor = (recibidas.mallas || {})[nombre];
    if (!porColor) {
      // Sin malla no se dibuja una caja mal: se dibuja la caja, y punto.
      mallas.set(nombre, null);
      continue;
    }

    const grupos = [];
    const union = [];
    for (const [codigo, triangulos] of Object.entries(porColor)) {
      const geometria = new THREE.BufferGeometry();
      geometria.setAttribute(
        'position',
        new THREE.BufferAttribute(new Float32Array(triangulos), 3),
      );
      // LDraw no trae normales; se calculan una vez por pieza, no por copia.
      geometria.computeVertexNormals();
      grupos.push({
        cuerpo: geometria,
        // El "16" es el cuerpo pintable: su color lo pone cada pieza.
        colorFijo: codigo === '16' ? null : (coloresLdraw[codigo] || null),
      });
      for (const v of triangulos) union.push(v);
    }

    // Los bordes, para que dos piezas del mismo color pegadas no parezcan una
    // sola. El umbral de 30 grados deja fuera los tramos de un cilindro
    // —los studs se tesela en trozos de unos 22 grados— y se queda con las
    // aristas de verdad. Se calcula una vez por pieza, no por copia: en un
    // hub son 6.348 triángulos.
    //
    // Se calculan sobre la UNIÓN de los grupos, no sobre el grupo "16": la
    // silueta es de la pieza entera, y EdgesGeometry junta los vértices por
    // posición, así que la unión da exactamente las mismas aristas que daba
    // la malla de una pieza en el formato 1. La geometría de la unión solo
    // vive para esto: EdgesGeometry copia lo que necesita.
    const geometria = new THREE.BufferGeometry();
    geometria.setAttribute(
      'position',
      new THREE.BufferAttribute(new Float32Array(union), 3),
    );
    const bordes = new THREE.EdgesGeometry(geometria, 30);
    geometria.dispose();

    mallas.set(nombre, { grupos, bordes });
  }
}

// Una arista negra sobre una pieza negra no dibuja nada. La silueta tiene que
// leerse en las dos, así que el borde se elige según lo oscura que sea.
// La fórmula es la luminancia relativa: el ojo ve el verde mucho más que el
// azul, y un azul "medio" es bastante más oscuro de lo que parece su número.
function esOscura(color) {
  const c = new THREE.Color(color);
  return 0.2126 * c.r + 0.7152 * c.g + 0.0722 * c.b < 0.22;
}

function limpiar(grupo) {
  while (grupo.children.length) {
    const hijo = grupo.children.pop();
    // Las mallas se comparten entre todas las copias de una pieza: liberarlas
    // aquí dejaría la escena sin geometría en el siguiente dibujado.
    if (hijo.geometry && !hijo.userData.compartida) hijo.geometry.dispose();
    if (hijo.material) hijo.material.dispose();
  }
}

// Lo dibujado, para poder pincharlo y resaltarlo. Cada entrada recuerda de qué
// línea salió y de qué color eran sus bordes, que es lo que hay que devolver al
// dejar de estar elegida.
const dibujadas = [];

function construir(piezas) {
  limpiar(modelo);
  dibujadas.length = 0;

  for (const p of piezas) {
    const oscura = esOscura(p.color);
    // Cada grupo de color lleva su propio material: el cuerpo (colorFijo
    // null) se pinta del color de la pieza, y los dibujos —la pupila de un
    // ojo, el «8» de la baldosa— de su color fijo, elija lo que elija quien
    // construye. La transparencia sí es de la pieza entera: unos ojos opacos
    // flotando en una pieza fantasma serían más raros que útiles.
    const materialDe = (colorFijo) => new THREE.MeshLambertMaterial({
      color: colorFijo || p.color,
      transparent: p.transparente,
      opacity: p.transparente ? 0.45 : 1,
      // Las dos caras, y no solo la de delante.
      //
      // LDraw dice hacia dónde mira cada triángulo con instrucciones BFC, y el
      // lector de este proyecto no las interpreta: para medir una caja daba
      // igual. Al dibujar no: la mitad de los triángulos quedan del revés y se
      // descartan, y las piezas se ven huecas, como tubos rotos.
      //
      // Interpretar BFC de verdad —CERTIFY CCW/CW, INVERTNEXT, y voltear
      // cuando una matriz invierte— es bastante maquinaria para llegar al
      // mismo sitio. Dibujar las dos caras cuesta algo de relleno y ya está:
      // la malla no está indexada, así que cada triángulo lleva su propia
      // normal y Three.js la voltea sola en las caras traseras.
      side: THREE.DoubleSide,
    });

    const malla = mallas.get(p.malla);
    if (malla) {
      // La pieza de verdad. El servidor manda la matriz y el origen ya
      // compuestos, así que aquí solo hay que aplicarlos.
      const colocar = (objeto) => {
        objeto.userData.compartida = true;
        objeto.matrixAutoUpdate = false;
        const m = p.matriz;
        const o = p.origen;
        objeto.matrix.set(
          m[0][0], m[0][1], m[0][2], o[0],
          m[1][0], m[1][1], m[1][2], o[1],
          m[2][0], m[2][1], m[2][2], o[2],
          0, 0, 0, 1,
        );
        modelo.add(objeto);
        return objeto;
      };

      const cuerposMalla = malla.grupos.map((grupo) =>
        colocar(new THREE.Mesh(grupo.cuerpo, materialDe(grupo.colorFijo))));

      // Los bordes no son adorno: dos piezas del mismo color pegadas son
      // caras coplanares con la misma luz, así que sin ellos una pared de
      // ladrillos se ve como un bloque liso. Y son también lo que hace que
      // una pieza oscura se despegue del fondo.
      const colorBorde = p.flotante ? 0xe0a458 : (oscura ? 0xaab3c4 : 0x1a1d24);
      const opacidadBorde = p.flotante ? 0.95 : (oscura ? 0.5 : 0.35);
      const aristasMalla = colocar(new THREE.LineSegments(malla.bordes, new THREE.LineBasicMaterial({
        color: colorBorde,
        transparent: true,
        opacity: opacidadBorde,
      })));

      anotar(p, cuerposMalla, aristasMalla, colorBorde, opacidadBorde);
      continue;
    }

    // Sin malla, una caja. Es lo que pasa con una pieza que LDraw no tenga.
    const caja = new THREE.BoxGeometry(p.ancho, p.fondo, p.alto);
    const cuerpo = new THREE.Mesh(caja, materialDe(null));
    cuerpo.position.set(p.x + p.ancho / 2, p.y + p.fondo / 2, p.z + p.alto / 2);
    modelo.add(cuerpo);

    const colorCaja = p.flotante ? 0xe0a458 : (oscura ? 0xaab3c4 : 0x000000);
    const opacidadCaja = p.flotante ? 0.95 : (oscura ? 0.55 : 0.3);
    const aristas = new THREE.LineSegments(
      new THREE.EdgesGeometry(caja),
      new THREE.LineBasicMaterial({
        color: colorCaja,
        transparent: true,
        opacity: opacidadCaja,
      }),
    );
    aristas.position.copy(cuerpo.position);
    modelo.add(aristas);

    anotar(p, [cuerpo], aristas, colorCaja, opacidadCaja);
  }

  pintarSeleccion();
}

function anotar(p, cuerpos, aristas, color, opacidad) {
  // Una línea puede poner varias piezas —eso hace `repetir`—, así que el
  // número de línea no basta para saber cuál es cuál: hace falta además qué
  // puesto ocupa dentro de su línea. Las dos cosas juntas sobreviven a un
  // recompilado, que es cuando se tira todo lo dibujado y se vuelve a hacer.
  //
  // `cuerpos` son las mallas de la pieza, una por grupo de color: pinchar la
  // pupila de un ojo es pinchar el ojo, así que todas apuntan a la misma
  // entrada.
  const orden = dibujadas.filter((d) => d.linea === p.linea).length;
  for (const cuerpo of cuerpos) cuerpo.userData.pieza = dibujadas.length;
  dibujadas.push({
    linea: p.linea, orden, cuerpos, aristas, color, opacidad, nombre: p.nombre,
    suelta: p.suelta,
    rueda: p.rueda,
    molde: p.molde, acoge: p.acoge, acogeCentro: p.acoge_centro,
    agarre: p.agarre, agarreEje: p.agarre_eje,
    engrane: p.engrane, cremallera: p.cremallera, conjunto: p.conjunto,
    machoCentro: p.macho_centro, machoEje: p.macho_eje, bocas: p.bocas,
    caja: { x: p.x, y: p.y, z: p.z, ancho: p.ancho, fondo: p.fondo, alto: p.alto },
  });
}


// --- Selección con el ratón -----------------------------------------------
//
// Se enciende la pieza que se ha pinchado, y solo esa: lo que toca el ratón es
// lo que tiene que responder.
//
// Editar es otra cosa. El código es el origen de la verdad y ahí la unidad es
// la línea, no la pieza: no hay manera de quitar un ladrillo de un `repetir`
// sin reescribir el bucle. Así que Supr borra la línea entera, y cuando esa
// línea pone varias piezas se dice antes, en vez de llevarse cuatro por
// sorpresa.

let seleccion = null;

const rayo = new THREE.Raycaster();
const puntero = new THREE.Vector2();

function esLaElegida(d) {
  return seleccion !== null && d.linea === seleccion.linea && d.orden === seleccion.orden;
}

// La seleccion multiple: shift+clic añade una pieza, o la quita si ya
// estaba. El clic normal la reduce a una sola, como siempre.
let marcadas = [];

function esMarcada(d) {
  return marcadas.some((m) => d.linea === m.linea && d.orden === m.orden);
}

function pintarSeleccion() {
  // La pieza puede haber desaparecido al recompilar. Si ya no la pone nadie,
  // no hay nada elegido.
  if (seleccion !== null && !dibujadas.some(esLaElegida)) seleccion = null;
  marcadas = marcadas.filter((m) => dibujadas.some(
    (d) => d.linea === m.linea && d.orden === m.orden,
  ));

  for (const d of dibujadas) {
    const elegida = esLaElegida(d) || esMarcada(d);
    d.aristas.material.color.set(elegida ? 0x63b3ed : d.color);
    d.aristas.material.opacity = elegida ? 1 : d.opacidad;
    // El borde solo se ve por fuera; el relleno dice cuál es sin taparla.
    // Se encienden todos los grupos de color: la pieza es una.
    for (const cuerpo of d.cuerpos) {
      cuerpo.material.emissive.set(elegida ? 0x14344f : 0x000000);
    }
  }
}

function verLinea(numero) {
  const alto = Number.parseFloat(getComputedStyle(areaCodigo).lineHeight) || 21;
  const arriba = (numero - 1) * alto;
  const visible = areaCodigo.clientHeight;
  if (arriba < areaCodigo.scrollTop || arriba + alto > areaCodigo.scrollTop + visible) {
    areaCodigo.scrollTop = Math.max(0, arriba - visible / 2);
  }
  gutter.scrollTop = areaCodigo.scrollTop;
}

function elegir(pieza) {
  seleccion = pieza && pieza.linea != null
    ? { linea: pieza.linea, orden: pieza.orden }
    : null;
  marcadas = seleccion ? [seleccion] : [];
  pintarSeleccion();
  pintarGutter(lineaRota);

  if (seleccion === null) {
    decir('');
    return;
  }

  const { linea } = seleccion;
  verLinea(linea);
  const texto = (areaCodigo.value.split('\n')[linea - 1] || '').trim();

  // Si la línea pone varias piezas, hay que decirlo antes de que Supr se lleve
  // las cuatro: se ha elegido una, pero lo que se borra es la línea.
  const hermanas = dibujadas.filter((d) => d.linea === linea).length;
  const pista = pieza.suelta
    ? ' Está suelta: mantén el clic sobre ella y arrástrala.'
    : '';
  decir(
    (hermanas > 1
      ? `${pieza.nombre} — línea ${linea}: ${texto} · pone ${hermanas} piezas, y Supr borra la línea entera.`
      : `${pieza.nombre} — línea ${linea}: ${texto} · Supr la borra.`) + pista,
  );
}

function marcar(pieza) {
  // Shift+clic: la pieza entra en la seleccion, o sale si ya estaba. La
  // ultima marcada pasa a ser la elegida, para que Supr y la consola
  // sigan hablando de una.
  if (pieza.linea == null) return;
  if (esMarcada(pieza)) {
    marcadas = marcadas.filter(
      (m) => !(m.linea === pieza.linea && m.orden === pieza.orden),
    );
  } else {
    marcadas.push({ linea: pieza.linea, orden: pieza.orden });
  }
  seleccion = marcadas.length ? marcadas[marcadas.length - 1] : null;
  pintarSeleccion();
  pintarGutter(lineaRota);
  if (marcadas.length > 1) {
    decir(`${marcadas.length} piezas marcadas. Clic derecho para moverlas o girarlas juntas; shift+clic suma o resta.`);
  } else if (marcadas.length === 1) {
    decir('1 pieza marcada. Shift+clic sobre otras para sumarlas.');
  } else {
    decir('');
  }
}

// --- Soltar piezas ----------------------------------------------------------
//
// Soltar una pieza ESCRIBE CÓDIGO: la línea entra por el mismo camino que la
// consola (validar primero, deshacer incluido). El visor solo elige el sitio.

const paleta = document.getElementById('paleta');
let armada = null;   // la pieza elegida en la paleta, o null
let moviendo = null; // la pieza que se esta reconectando, con su silueta
let verboMovimiento = 'Conectada'; // que dira la consola al soltar
let arrastrable = null; // la pieza suelta bajo el boton apretado
let ultimoInventario = null; // lo dijo el ultimo compilado
let fantasma = null; // la caja translúcida que sigue al puntero

// Un plano invisible en z=0, dentro del grupo del modelo: para soltar en el
// suelo aunque no haya ninguna pieza que pinchar.
const suelo = new THREE.Mesh(
  new THREE.PlaneGeometry(4000, 4000),
  new THREE.MeshBasicMaterial({ visible: false }),
);
suelo.position.set(0, 0, 0);
modelo.add(suelo);

// Cada pieza de la paleta se renderiza UNA vez con su malla de verdad y
// queda cacheada como imagen: como el BlockCAD original.
const miniaturas = new Map();
let miniRender = null;

function miniatura(nombreMalla, color) {
  if (miniaturas.has(nombreMalla)) return miniaturas.get(nombreMalla);
  const malla = mallas.get(nombreMalla);
  if (!malla) return null;
  if (!miniRender) {
    miniRender = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    miniRender.setSize(48, 48);
  }
  const escenita = new THREE.Scene();
  const grupo = new THREE.Group();
  grupo.rotation.x = -Math.PI / 2;
  // Los mismos grupos de color que en el visor: la miniatura de los ojos
  // enseña sus pupilas, no un cuadrado liso.
  for (const parte of malla.grupos) {
    grupo.add(new THREE.Mesh(parte.cuerpo, new THREE.MeshLambertMaterial({
      color: parte.colorFijo || color, side: THREE.DoubleSide,
    })));
  }
  grupo.add(new THREE.LineSegments(malla.bordes, new THREE.LineBasicMaterial({
    color: 0x1a1d24, transparent: true, opacity: 0.4,
  })));
  escenita.add(grupo);
  escenita.add(new THREE.AmbientLight(0xffffff, 0.9));
  const foco = new THREE.DirectionalLight(0xffffff, 1.3);
  foco.position.set(1, 2, 1.5);
  escenita.add(foco);
  const caja = new THREE.Box3().setFromObject(grupo);
  const centro = caja.getCenter(new THREE.Vector3());
  const radio = caja.getSize(new THREE.Vector3()).length() / 2 || 1;
  const cam = new THREE.PerspectiveCamera(35, 1, radio / 10, radio * 10);
  cam.position.set(centro.x + radio * 1.6, centro.y + radio * 1.3, centro.z + radio * 1.8);
  cam.lookAt(centro);
  miniRender.render(escenita, cam);
  const url = miniRender.domElement.toDataURL();
  miniaturas.set(nombreMalla, url);
  return url;
}

async function abrirPaleta() {
  if (!paleta.hidden) { paleta.hidden = true; desarmar(); return; }
  const encontrado = areaCodigo.value.match(/^\s*catalogo\s+"([^"]+)"/m);
  const nombre = encontrado ? encontrado[1] : 'basico';
  const respuesta = await fetch('/api/piezas', { method: 'POST', body: nombre });
  const datos = await respuesta.json();

  const cabecera = document.createElement('div');
  cabecera.style.cssText = 'padding:4px 6px 8px;font-size:11px;color:#8b93a7;';
  if (ultimoInventario) {
    const quedan = ultimoInventario.total - ultimoInventario.usadas;
    cabecera.textContent = `Set 45300: usas ${ultimoInventario.usadas} de ` +
      `${ultimoInventario.total} piezas · te quedan ${Math.max(0, quedan)}`;
  } else {
    cabecera.textContent = 'Catálogo básico (7 piezas idealizadas).';
    const cambiar = document.createElement('button');
    cambiar.textContent = 'usar el set 45300 (97 moldes)';
    cambiar.addEventListener('click', () => {
      // Cambiar de catálogo es ESCRIBIR la línea, con su deshacer.
      registrar();
      aplicar('catalogo "wedo"\n' + areaCodigo.value);
      paleta.hidden = true;
      abrirPaleta();
    });
    cabecera.append(document.createElement('br'), cambiar);
  }
  await pedirMallas(datos.piezas.map((pieza) => pieza.malla));
  paleta.replaceChildren(cabecera, ...datos.piezas.map((pieza) => {
    const boton = document.createElement('button');
    const imagen = miniatura(pieza.malla, pieza.color);
    if (imagen) {
      const img = document.createElement('img');
      img.src = imagen;
      img.width = 36;
      img.height = 36;
      boton.append(img);
    }
    const texto = document.createElement('span');
    texto.textContent = pieza.cantidad
      ? `${pieza.escritura}  ×${pieza.cantidad}` : pieza.escritura;
    boton.append(texto);
    boton.title = pieza.nombre;
    boton.addEventListener('click', () => armar(pieza, boton));
    return boton;
  }));
  paleta.hidden = false;
}

function armar(pieza, boton) {
  desarmar();
  armada = pieza;
  boton.classList.add('armada');
  fantasma = new THREE.Mesh(
    new THREE.BoxGeometry(pieza.ancho, pieza.fondo, pieza.alto),
    new THREE.MeshBasicMaterial({
      color: pieza.color, transparent: true, opacity: 0.45, depthWrite: false,
    }),
  );
  fantasma.visible = false;
  modelo.add(fantasma);
  decir(`Pincha el suelo o una pieza para soltar ${pieza.escritura}. Esc cancela.`);
}

function desarmar() {
  armada = null;
  moviendo = null;
  arrastrable = null;
  controles.enabled = true;
  borrarFantasma();
  for (const b of paleta.querySelectorAll('.armada')) b.classList.remove('armada');
}

// Dónde caería la pieza: sobre el suelo o sobre la tapa de lo pinchado,
// con la esquina ajustada a studs enteros. Devuelve LDU.
function medidasEnJuego() {
  if (armada) return { ancho: armada.ancho, fondo: armada.fondo };
  return { ancho: moviendo.caja.ancho, fondo: moviendo.caja.fondo };
}

function sitioParaSoltar(evento) {
  const caja = lienzo.getBoundingClientRect();
  puntero.x = ((evento.clientX - caja.left) / caja.width) * 2 - 1;
  puntero.y = -((evento.clientY - caja.top) / caja.height) * 2 + 1;
  rayo.setFromCamera(puntero, camara);
  const blancos = [suelo, ...dibujadas
    .filter((d) => !moviendo
      || (d !== moviendo && !(moviendo.piezas && moviendo.piezas.includes(d))))
    .flatMap((d) => d.cuerpos)];
  const tocado = rayo.intersectObjects(blancos, false)[0];
  if (!tocado) return null;

  const medidas = medidasEnJuego();
  const local = modelo.worldToLocal(tocado.point.clone());
  const paralelos = (a, b) => {
    const cruz = [
      a[1] * b[2] - a[2] * b[1],
      a[2] * b[0] - a[0] * b[2],
      a[0] * b[1] - a[1] * b[0],
    ];
    return cruz.every((v) => Math.abs(v) < 1e-6);
  };
  const bocaCercana = (bocas, eje) => {
    let mejor = null;
    let distancia = Infinity;
    for (const boca of bocas) {
      if (!paralelos(boca.eje, eje)) continue;
      const d = Math.hypot(
        boca.centro[0] - local.x,
        boca.centro[1] - local.y,
        boca.centro[2] - local.z,
      );
      if (d < distancia) { distancia = d; mejor = boca; }
    }
    return mejor;
  };

  // El iman de la rueda: si lo que se mueve es un neumatico y debajo hay
  // una llanta (o al reves), el sitio es EL montaje: concentrico en el
  // plano de la rueda, centrado dentro del tambor.
  // El iman de la INSERCION: arrastrando un eje o un pin sobre una pieza
  // con agujeros, la silueta salta a la boca mas cercana cuya recta corra
  // paralela al macho — casar la recta a mano es punteria imposible. La
  // rotacion la pone el usuario (girar); si nada es paralelo, no hay iman.
  if (moviendo && moviendo.machoCentro && tocado.object !== suelo) {
    const otra = dibujadas[tocado.object.userData.pieza];
    if (otra && otra.bocas && otra !== moviendo) {
      const mejor = bocaCercana(otra.bocas, moviendo.machoEje);
      if (mejor) {
        return {
          x: mejor.centro[0] - moviendo.machoCentro[0],
          y: mejor.centro[1] - moviendo.machoCentro[1],
          z: mejor.centro[2] - moviendo.machoCentro[2],
        };
      }
    }
  }

  // El iman de la cremallera: arrastrandola sobre una rueda dentada, su
  // linea de paso se hace tangente al circulo primitivo de la rueda. Los
  // dientes deben MIRAR a la rueda (voltear si hace falta) y sus crestas
  // correr paralelas al eje; a lo largo manda el puntero, a studs.
  if (moviendo && moviendo.cremallera && tocado.object !== suelo) {
    const otra = dibujadas[tocado.object.userData.pieza];
    if (otra && otra.engrane) {
      const n = moviendo.cremallera.normal;
      const e = otra.engrane.eje;
      const perpendiculares = Math.abs(n[0] * e[0] + n[1] * e[1] + n[2] * e[2]) < 1e-6;
      if (perpendiculares) {
        let k = 0;
        for (let i = 0; i < 3; i++) if (Math.abs(n[i]) > Math.abs(n[k])) k = i;
        let j = 0;
        for (let i = 0; i < 3; i++) if (Math.abs(e[i]) > Math.abs(e[j])) j = i;
        const i = [0, 1, 2].find((v) => v !== k && v !== j);
        const mias = [moviendo.caja.ancho, moviendo.caja.fondo, moviendo.caja.alto];
        const punto = [local.x, local.y, local.z];
        const sitio = [0, 0, 0];
        sitio[k] = n[k] > 0
          ? otra.engrane.punto[k] - otra.engrane.radio - moviendo.cremallera.paso
          : otra.engrane.punto[k] + otra.engrane.radio + moviendo.cremallera.paso - mias[k];
        sitio[j] = otra.engrane.punto[j] - mias[j] / 2;
        sitio[i] = Math.round((punto[i] - mias[i] / 2) / 20) * 20;
        return { x: sitio[0], y: sitio[1], z: sitio[2] };
      }
    }
  }

  // El iman del contenedor: arrastrando un huesped sobre su caja, su
  // agujero se ancla sobre la boca paralela mas cercana al puntero. El
  // sinfin cae a la recta baja; el engranaje, a la ranura de arriba: cada
  // huesped trae su agujero y la caja ofrece sus bocas.
  if (moviendo && tocado.object !== suelo) {
    const otra = dibujadas[tocado.object.userData.pieza];
    if (otra && otra.acoge && otra.acoge.includes(moviendo.molde)
        && moviendo.agarre && moviendo.agarreEje && otra.bocas) {
      const mejor = bocaCercana(otra.bocas, moviendo.agarreEje);
      if (mejor) {
        return {
          x: mejor.centro[0] - moviendo.agarre[0],
          y: mejor.centro[1] - moviendo.agarre[1],
          z: mejor.centro[2] - moviendo.agarre[2],
        };
      }
    }
  }

  if (moviendo && moviendo.rueda && tocado.object !== suelo) {
    const otra = dibujadas[tocado.object.userData.pieza];
    if (otra && otra.rueda && otra.rueda !== moviendo.rueda) {
      const mia = [moviendo.caja.ancho, moviendo.caja.fondo, moviendo.caja.alto];
      const suya = [otra.caja.ancho, otra.caja.fondo, otra.caja.alto];
      const base = [otra.caja.x, otra.caja.y, otra.caja.z];
      // El eje de giro: la dimension impar de la pieza redonda.
      let eje = 1;
      for (let k = 0; k < 3; k++) {
        const otras = [0, 1, 2].filter((j) => j !== k).map((j) => mia[j]);
        if (otras[0] === otras[1] && mia[k] !== otras[0]) eje = k;
      }
      const sitio = [0, 0, 0];
      for (let k = 0; k < 3; k++) {
        sitio[k] = k === eje
          ? base[k] + Math.floor((suya[k] - mia[k]) / 2)
          : base[k] + (suya[k] - mia[k]) / 2;
      }
      return { x: sitio[0], y: sitio[1], z: sitio[2] };
    }
  }

  const x = Math.round((local.x - medidas.ancho / 2) / 20) * 20;
  const y = Math.round((local.y - medidas.fondo / 2) / 20) * 20;
  let z = 0;
  if (tocado.object !== suelo) {
    const encima = dibujadas[tocado.object.userData.pieza];
    if (encima) z = encima.caja.z + encima.caja.alto;
  }
  return { x, y, z };
}

lienzo.addEventListener('pointermove', (evento) => {
  if (arrastrable && !moviendo && apretado) {
    const recorrido = Math.hypot(evento.clientX - apretado.x, evento.clientY - apretado.y);
    if (recorrido > 5) {
      iniciarMovimiento(arrastrable, 'Movida');
      decir('Suelta el boton donde quieras dejarla. Esc cancela.');
    }
  }
  if ((!armada && !moviendo) || !fantasma) return;
  const sitio = sitioParaSoltar(evento);
  fantasma.visible = sitio !== null;
  if (sitio) {
    if (fantasma.isGroup) {
      // El grupo lleva las mallas en sus posiciones de origen: se desplaza
      // por la diferencia con la esquina de la pieza.
      fantasma.position.set(
        sitio.x - moviendo.caja.x, sitio.y - moviendo.caja.y, sitio.z - moviendo.caja.z,
      );
    } else {
      const alto = armada ? armada.alto : moviendo.caja.alto;
      const medidas = medidasEnJuego();
      fantasma.position.set(
        sitio.x + medidas.ancho / 2, sitio.y + medidas.fondo / 2, sitio.z + alto / 2,
      );
    }
  }
});

addEventListener('keydown', (evento) => {
  if (evento.key === 'Escape') {
    cerrarMenu();
    if (armada || moviendo) { desarmar(); decir(''); }
    if (manoActiva) alternarMano(false);
  }

  // H alterna la mano, como en los editores de mapas. Solo fuera del texto:
  // escribiendo, la h es una letra.
  if (evento.key === 'h' || evento.key === 'H') {
    const donde = document.activeElement;
    if (donde === areaCodigo || donde === areaOrden) return;
    alternarMano();
  }

  // Mientras se coloca una pieza el clic esta ocupado confirmando, asi que
  // la camara se orbita con las flechas. Solo en ese modo: el resto del
  // tiempo ya existe el arrastre, y las flechas del editor son del texto.
  if (!armada && !moviendo) return;
  const donde = document.activeElement;
  if (donde === areaCodigo || donde === areaOrden) return;
  const PASO = 0.08;
  const giros = {
    ArrowLeft: [PASO, 0],
    ArrowRight: [-PASO, 0],
    ArrowUp: [0, -PASO],
    ArrowDown: [0, PASO],
  };
  // Re Pag y Av Pag acercan y alejan: el zoom del teclado.
  const zoom = { PageUp: 0.9, PageDown: 1 / 0.9 }[evento.key];
  const giro = giros[evento.key];
  if (!giro && !zoom) return;
  evento.preventDefault();
  const desde = camara.position.clone().sub(controles.target);
  const esfera = new THREE.Spherical().setFromVector3(desde);
  if (giro) {
    esfera.theta += giro[0];
    esfera.phi = Math.min(Math.PI - 0.05, Math.max(0.05, esfera.phi + giro[1]));
  }
  if (zoom) {
    // Acotado como el propio OrbitControls: ni dentro de la pieza ni en
    // la estratosfera.
    esfera.radius = Math.min(400, Math.max(0.5, esfera.radius * zoom));
  }
  desde.setFromSpherical(esfera);
  camara.position.copy(controles.target).add(desde);
  camara.lookAt(controles.target);
  controles.update();
});

// Orbitar es arrastrar, y arrastrar termina en un clic. Lo que separa las dos
// cosas es si el puntero se ha movido.

function resaltarProblema(lineasProblema) {
  // Las piezas que estorban, en rojo: se ve QUE hay que quitar primero.
  // Cualquier repintado de la seleccion lo limpia, y si no, el tiempo.
  for (const d of dibujadas) {
    if (lineasProblema.includes(d.linea)) {
      d.aristas.material.color.set(0xff6b6b);
      d.aristas.material.opacity = 1;
      for (const cuerpo of d.cuerpos) cuerpo.material.emissive.set(0x5a1a1a);
    }
  }
  setTimeout(pintarSeleccion, 4000);
}

function avisarChoque(prefijo, mensaje) {
  // El motor nombra las lineas culpables; aqui se convierten en remedio.
  const numeros = [...mensaje.matchAll(/l\u00ednea (\d+)/g)].map((m) => parseInt(m[1], 10));
  if (numeros.length) {
    resaltarProblema(numeros);
    const cuales = numeros.join(', ');
    decir(prefijo + ': choca con la pieza de la linea ' + cuales
      + ' (resaltada en rojo). Quita o mueve esa primero.', 'fallo');
  } else {
    decir(prefijo + ': ' + mensaje, 'fallo');
  }
}

function escenaAlDia() {
  // Con el codigo roto, el visor enseña la ULTIMA FOTO que compilo y los
  // numeros de linea de las piezas ya no casan con el texto: editar por
  // numero tocaria lineas equivocadas. La consola ya se protegia asi.
  if (codigoValido) return true;
  decir('El codigo no compila (mira la linea roja): arreglalo antes de mover piezas con el raton.', 'fallo');
  return false;
}

async function mudarPieza(cual, sx, sy, sz, verbo, fallo, avisar = true) {
  if (!escenaAlDia()) return null;
  // La mudanza: reescribir la linea de la pieza a una posicion absoluta.
  // La usan desconectar (sitio automatico) y conectar (sitio elegido).
  const hermanas = dibujadas.filter((d) => d.linea === cual.linea).length;
  if (hermanas > 1) {
    decir('Esa linea pone ' + hermanas + ' piezas (un repetir): no se puede mover una sola. Edita el bucle en el codigo.', 'fallo');
    return null;
  }
  const lineas = areaCodigo.value.split('\n');
  const vieja = lineas[cual.linea - 1];
  const partes = vieja.match(/^(\s*)(\S+(?:\s+\d+(?:x\d+)?)?)\s+((?:encima|en).*)$/);
  if (!partes) {
    decir('No he sabido reescribir esa linea.', 'fallo');
    return null;
  }
  // Las opciones sobreviven a la mudanza; el lugar no.
  const opciones = (partes[3].match(/(color\s+\S+|rot(?:ado)?(?:\s+[xyz])?\s+\d+|llamado\s+\S+|grupo\s+\d+|paso\s+\d+|transparente)/g) || []).join(' ');
  lineas[cual.linea - 1] = partes[1] + partes[2] + ' en ' + sx + ',' + sy + ',' + sz
    + (opciones ? ' ' + opciones : '');
  const propuesta = lineas.join('\n');

  let datos;
  try {
    const respuesta = await fetch('/api/modelo', { method: 'POST', body: propuesta });
    datos = await respuesta.json();
  } catch (error) {
    decir('No se pudo hablar con el servidor: ' + error.message, 'fallo');
    return null;
  }
  if (!datos.ok) {
    if (avisar) avisarChoque(fallo, datos.mensaje);
    return false;
  }
  registrar();
  aplicar(propuesta);
  decir(verbo + ': la pieza de la linea ' + cual.linea + ' quedo en ' + sx + ',' + sy + ',' + sz + '.', 'hecho');
  return true;
}

opcionQuitar.addEventListener('click', async () => {
  if (!piezaDelMenu) return cerrarMenu();
  const cual = piezaDelMenu;
  cerrarMenu();

  // Desconectar SEPARA, no elimina — y la deja CERCA: se prueban huecos
  // alrededor de donde estaba, en anillos crecientes, validando cada uno
  // en silencio hasta que alguno compile. Mandarla al borde del modelo era
  // la regla facil; quien desconecta quiere la pieza a mano.
  const c = cual.caja;
  const candidatos = [];
  for (let k = 1; k <= 5; k++) {
    candidatos.push([c.x + c.ancho + 20 * k, c.y]);
    candidatos.push([c.x - c.ancho - 20 * k, c.y]);
    candidatos.push([c.x, c.y + c.fondo + 20 * k]);
    candidatos.push([c.x, c.y - c.fondo - 20 * k]);
  }
  for (const [sx, sy] of candidatos) {
    const resultado = await mudarPieza(
      cual, sx / 20, sy / 20, 0, 'Separada', 'Al separarla choca', false,
    );
    if (resultado === true || resultado === null) return;
  }
  // Ningun hueco cercano: el ultimo intento avisa con la enseñanza.
  mudarPieza(cual, (c.x + c.ancho + 20) / 20, c.y / 20, 0,
    'Separada', 'Al separarla choca', true);
});

function iniciarMovimiento(cual, verbo) {
  desarmar();
  // La silueta: la caja de la pieza, siguiendo al puntero como en la
  // paleta. Conectar confirma con un clic; arrastrar, al soltar el boton.
  moviendo = cual;
  verboMovimiento = verbo;
  fantasma = new THREE.Group();
  for (const cuerpo of cual.cuerpos) {
    const copia = new THREE.Mesh(cuerpo.geometry, new THREE.MeshBasicMaterial({
      color: 0x63b3ed, transparent: true, opacity: 0.45, depthWrite: false,
      side: THREE.DoubleSide,
    }));
    copia.matrixAutoUpdate = false;
    copia.matrix.copy(cuerpo.matrix);
    fantasma.add(copia);
  }
  fantasma.visible = false;
  modelo.add(fantasma);
}

function iniciarMovimientoGrupo(piezas, verbo) {
  desarmar();
  // Un grupo se mueve como UNA pieza: su caja es la que envuelve a todas
  // y su silueta lleva los clones de cada una en su sitio relativo.
  const minX = Math.min(...piezas.map((p) => p.caja.x));
  const minY = Math.min(...piezas.map((p) => p.caja.y));
  const minZ = Math.min(...piezas.map((p) => p.caja.z));
  moviendo = {
    esGrupo: true,
    piezas,
    caja: {
      x: minX, y: minY, z: minZ,
      ancho: Math.max(...piezas.map((p) => p.caja.x + p.caja.ancho)) - minX,
      fondo: Math.max(...piezas.map((p) => p.caja.y + p.caja.fondo)) - minY,
      alto: Math.max(...piezas.map((p) => p.caja.z + p.caja.alto)) - minZ,
    },
  };
  verboMovimiento = verbo;
  fantasma = new THREE.Group();
  for (const pieza of piezas) {
    for (const cuerpo of pieza.cuerpos) {
      const copia = new THREE.Mesh(cuerpo.geometry, new THREE.MeshBasicMaterial({
        color: 0x63b3ed, transparent: true, opacity: 0.45, depthWrite: false,
        side: THREE.DoubleSide,
      }));
      copia.matrixAutoUpdate = false;
      copia.matrix.copy(cuerpo.matrix);
      fantasma.add(copia);
    }
  }
  fantasma.visible = false;
  modelo.add(fantasma);
}

async function mudarGrupo(grupo, sitio) {
  // Mover un grupo es reescribir TODAS sus lineas con el mismo paso, y
  // validar una sola vez: o se muda entero o no se muda nada. Las lineas
  // relacionales (en el agujero de...) no se tocan: siguen a su ancla.
  if (!escenaAlDia()) return;
  const dx = sitio.x - grupo.caja.x;
  const dy = sitio.y - grupo.caja.y;
  const dz = sitio.z - grupo.caja.z;
  if (!dx && !dy && !dz) { decir(''); return; }
  const numeros = [...new Set(grupo.piezas.map((p) => p.linea))];
  if (numeros.some((n) => n == null)) {
    decir('Alguna pieza del grupo no viene del codigo: no puedo moverlo.', 'fallo');
    return;
  }
  for (const n of numeros) {
    const enLista = grupo.piezas.filter((p) => p.linea === n).length;
    const enTotal = dibujadas.filter((d) => d.linea === n).length;
    if (enLista < enTotal) {
      decir(`La linea ${n} pone ${enTotal} piezas (un repetir) y la seleccion no las lleva todas. Marca todas o edita el codigo.`, 'fallo');
      return;
    }
  }
  const lineas = areaCodigo.value.split('\n');
  const re = /(\sen\s+)(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)/;
  for (const n of numeros) {
    const vieja = lineas[n - 1];
    const donde = vieja.match(re);
    if (!donde) continue;
    const nx = (Math.round(parseFloat(donde[2]) * 20) + dx) / 20;
    const ny = (Math.round(parseFloat(donde[3]) * 20) + dy) / 20;
    const nz = (Math.round(parseFloat(donde[4]) * 8) + dz) / 8;
    lineas[n - 1] = vieja.replace(re, `$1${nx},${ny},${nz}`);
  }
  const propuesta = lineas.join('\n');
  let datos;
  try {
    const respuesta = await fetch('/api/modelo', { method: 'POST', body: propuesta });
    datos = await respuesta.json();
  } catch (error) {
    decir('No se pudo hablar con el servidor: ' + error.message, 'fallo');
    return;
  }
  if (!datos.ok) {
    avisarChoque('Ahi el grupo choca', datos.mensaje);
    return;
  }
  registrar();
  aplicar(propuesta);
  decir(`Movido el grupo entero: ${grupo.piezas.length} piezas.`, 'hecho');
}

async function girarGrupo(piezas) {
  // Girar un grupo es girarlo RIGIDO: un cuarto de vuelta del mundo
  // alrededor de la esquina del grupo, que se queda donde estaba. Cada
  // caja gira de posicion ((x,y) pasa a (-y,x)) y cada linea encadena su
  // rot 90; se valida todo junto.
  if (!escenaAlDia()) return;
  const numeros = [...new Set(piezas.map((p) => p.linea))];
  if (numeros.some((n) => n == null)) {
    decir('Alguna pieza del grupo no viene del codigo: no puedo girarlo.', 'fallo');
    return;
  }
  for (const n of numeros) {
    if (dibujadas.filter((d) => d.linea === n).length > 1) {
      decir('Ahi hay un repetir: girarlo cambiaria el bucle. Edita el codigo.', 'fallo');
      return;
    }
  }
  const minX = Math.min(...piezas.map((p) => p.caja.x));
  const minY = Math.min(...piezas.map((p) => p.caja.y));
  const giradas = piezas.map((p) => ({
    pieza: p,
    x: -(p.caja.y - minY + p.caja.fondo),
    y: p.caja.x - minX,
  }));
  const desX = Math.min(...giradas.map((g) => g.x));
  const desY = Math.min(...giradas.map((g) => g.y));
  const lineas = areaCodigo.value.split('\n');
  const re = /(\sen\s+)(-?[\d.]+)\s*,\s*(-?[\d.]+)\s*,\s*(-?[\d.]+)/;
  const conGiro = (vieja) => {
    const acaba = vieja.match(/^(.*?)\s+rot\s+(90|180|270)\s*$/);
    if (acaba) {
      const grados = (parseInt(acaba[2], 10) + 90) % 360;
      return grados ? `${acaba[1]} rot ${grados}` : acaba[1];
    }
    return `${vieja} rot 90`;
  };
  for (const g of giradas) {
    const n = g.pieza.linea;
    let vieja = lineas[n - 1];
    const donde = vieja.match(re);
    if (!donde) continue; // relacional: que lo resuelva su ancla
    const nx = (minX + g.x - desX) / 20;
    const ny = (minY + g.y - desY) / 20;
    vieja = vieja.replace(re, `$1${nx},${ny},$4`);
    lineas[n - 1] = conGiro(vieja);
  }
  const propuesta = lineas.join('\n');
  let datos;
  try {
    const respuesta = await fetch('/api/modelo', { method: 'POST', body: propuesta });
    datos = await respuesta.json();
  } catch (error) {
    decir('No se pudo hablar con el servidor: ' + error.message, 'fallo');
    return;
  }
  if (!datos.ok) {
    avisarChoque('Girado, el grupo choca', datos.mensaje);
    return;
  }
  registrar();
  aplicar(propuesta);
  decir(`Girado el grupo entero: ${piezas.length} piezas.`, 'hecho');
}

function borrarFantasma() {
  if (!fantasma) return;
  modelo.remove(fantasma);
  // La geometria es la de las piezas de verdad: solo se tiran los
  // materiales del clon. La caja de la paleta si es propia.
  if (fantasma.isGroup) {
    for (const hijo of fantasma.children) hijo.material.dispose();
  } else {
    fantasma.geometry.dispose();
  }
  fantasma = null;
}

opcionGirar.addEventListener('click', async () => {
  if (!piezaDelMenu) return cerrarMenu();
  if (!escenaAlDia()) return cerrarMenu();
  const numero = piezaDelMenu.linea;
  cerrarMenu();
  const lineas = areaCodigo.value.split('\n');
  const vieja = lineas[numero - 1];
  // Si la linea acaba en un giro de siempre (sobre z), se avanza el angulo
  // en vez de encadenar `rot 90` tras `rot 90`: el codigo queda legible.
  const acaba = vieja.match(/^(.*?)\s+rot\s+(90|180|270)\s*$/);
  let nueva;
  if (acaba) {
    const grados = (parseInt(acaba[2], 10) + 90) % 360;
    nueva = grados ? `${acaba[1]} rot ${grados}` : acaba[1];
  } else {
    nueva = `${vieja} rot 90`;
  }
  lineas[numero - 1] = nueva;
  const propuesta = lineas.join('\n');
  // Validar antes de tocar: si girada choca, el codigo queda intacto.
  let datos;
  try {
    const respuesta = await fetch('/api/modelo', { method: 'POST', body: propuesta });
    datos = await respuesta.json();
  } catch (error) {
    decir('No se pudo hablar con el servidor: ' + error.message, 'fallo');
    return;
  }
  if (!datos.ok) {
    avisarChoque('Girada choca', datos.mensaje);
    return;
  }
  registrar();
  aplicar(propuesta);
  decir(`Girada la pieza de la línea ${numero}.`, 'hecho');
});

opcionVoltear.addEventListener('click', async () => {

  // Voltear es media vuelta sobre x: boca arriba, boca abajo. Dos veces

  lineas[numero - 1] = nueva;
  const propuesta = lineas.join('\n');

});

  if (!menuCtx.contains(evento.target)) cerrarMenu();

lienzo.addEventListener('pointerdown', (evento) => {
  apretado = { x: evento.clientX, y: evento.clientY };

  // Apretar sobre la pieza ELEGIDA y SUELTA la agarra: si el puntero se
  // mueve, la pieza se va con el, y al soltar el boton se queda. Una pieza
  // enganchada no se agarra: arrastrarla arrancaria medio modelo.
  if (evento.button !== 0 || armada || moviendo || manoActiva) return;
  const caja = lienzo.getBoundingClientRect();
  puntero.x = ((evento.clientX - caja.left) / caja.width) * 2 - 1;
  puntero.y = -((evento.clientY - caja.top) / caja.height) * 2 + 1;
  rayo.setFromCamera(puntero, camara);
  const tocada = rayo.intersectObjects(dibujadas.flatMap((d) => d.cuerpos), false)[0];
  const cual = tocada ? dibujadas[tocada.object.userData.pieza] : null;
  if (cual && esLaElegida(cual) && cual.suelta && cual.linea != null) {
    arrastrable = cual;
    controles.enabled = false;
  }
});

lienzo.addEventListener('pointerup', (evento) => {
  if (!apretado) return;
  const movido = Math.hypot(evento.clientX - apretado.x, evento.clientY - apretado.y);
  apretado = null;
  if (movido > 5) return;

  if (evento.button === 2) {
    // Arrastrar con el derecho sigue siendo desplazar la camara; solo el
    // clic quieto quita. Y quita por el camino de la consola: con deshacer.
    const caja2 = lienzo.getBoundingClientRect();
    puntero.x = ((evento.clientX - caja2.left) / caja2.width) * 2 - 1;
    puntero.y = -((evento.clientY - caja2.top) / caja2.height) * 2 + 1;
    rayo.setFromCamera(puntero, camara);
    const tocada = rayo.intersectObjects(dibujadas.flatMap((d) => d.cuerpos), false)[0];
    const cual = tocada ? dibujadas[tocada.object.userData.pieza] : null;
    if (cual && cual.linea != null) {
      piezaDelMenu = cual;
      // Las opciones de la seleccion solo aparecen cuando hay varias.
      const varias = marcadas.length > 1;
      opcionMoverMarcadas.style.display = varias ? '' : 'none';
      opcionGirarMarcadas.style.display = varias ? '' : 'none';
      opcionMoverMarcadas.textContent = `mover seleccion (${marcadas.length})`;
      opcionGirarMarcadas.textContent = `girar seleccion (${marcadas.length})`;
      menuCtx.style.left = evento.clientX + 'px';
      menuCtx.style.top = evento.clientY + 'px';
      menuCtx.style.display = 'block';
    }
    return;
  }

  if (moviendo) {
    // Conectar confirma con un clic; el arrastre, al soltar el boton. En
    // los dos casos este pointerup es el momento.
    const eraArrastre = arrastrable !== null;
    const sitio = sitioParaSoltar(evento);
    if (sitio) {
      if (moviendo.esGrupo) {
        mudarGrupo(moviendo, sitio);
      } else {
        mudarPieza(moviendo, sitio.x / 20, sitio.y / 20, sitio.z / 8,
          verboMovimiento, 'Ahi choca');
      }
      moviendo = null;
      borrarFantasma();
    } else if (eraArrastre) {
      // Soltar fuera del plano cancela el arrastre.
      desarmar();
      decir('');
    }
    arrastrable = null;
    controles.enabled = true;
    if (!eraArrastre) return;
    return;
  }
  arrastrable = null;
  controles.enabled = true;

  if (armada) {
    const sitio = sitioParaSoltar(evento);
    if (sitio) {
      // En studs y placas, que es como habla el lenguaje. El camino es el de
      // la consola: valida antes de tocar el código y registra el deshacer.
      const sx = sitio.x / 20, sy = sitio.y / 20, sz = sitio.z / 8;
      anadirPiezas(`${armada.escritura} en ${sx},${sy},${sz}`);
      desarmar();
    }
    return;
  }

  const caja = lienzo.getBoundingClientRect();
  puntero.x = ((evento.clientX - caja.left) / caja.width) * 2 - 1;
  puntero.y = -((evento.clientY - caja.top) / caja.height) * 2 + 1;
  rayo.setFromCamera(puntero, camara);

  // Solo los cuerpos: pinchar un borde es pinchar un pelo.
  const tocadas = rayo.intersectObjects(dibujadas.flatMap((d) => d.cuerpos), false);
  const pieza = tocadas.length ? dibujadas[tocadas[0].object.userData.pieza] : null;

  // Una pieza importada de un JSON no viene de ninguna línea. Se dibuja, pero
  // no hay código al que llevar.
  if (pieza && pieza.linea == null) {
    elegir(null);
    decir('Esta pieza no viene del código, así que no puedo llevarte a ella.', 'fallo');
    return;
  }

  if (evento.shiftKey && pieza) {
    marcar(pieza);
    return;
  }
  elegir(pieza && esLaElegida(pieza) ? null : pieza);
});

addEventListener('keydown', (evento) => {
  if (evento.key !== 'Delete' && evento.key !== 'Supr') return;
  // Si se está escribiendo, Supr borra letras, que es lo suyo.
  const donde = document.activeElement;
  if (donde === areaCodigo || donde === areaOrden) return;
  if (seleccion === null) return;
  evento.preventDefault();
  borrar(String(seleccion.linea));
  seleccion = null;
});


// Las barras pasean la vista por la extension del modelo: paneo, no
// orbita. Mover el objetivo sin mover la camara giraria la escena.
function desplazarVista(eje, valor) {
  const caja = new THREE.Box3().setFromObject(modelo);
  if (caja.isEmpty()) return;
  const destino = caja.min[eje] + (valor / 100) * (caja.max[eje] - caja.min[eje]);
  const delta = destino - controles.target[eje];
  controles.target[eje] += delta;
  camara.position[eje] += delta;
  controles.update();
}

const barraX = document.getElementById('barra-x');
const barraY = document.getElementById('barra-y');
barraX.addEventListener('input', () => desplazarVista('x', Number(barraX.value)));
barraY.addEventListener('input', () => desplazarVista('z', Number(barraY.value)));

function sincronizarBarras() {
  const caja = new THREE.Box3().setFromObject(modelo);
  if (caja.isEmpty()) return;
  for (const [barra, eje] of [[barraX, 'x'], [barraY, 'z']]) {
    const ancho = caja.max[eje] - caja.min[eje];
    const v = ancho > 0 ? ((controles.target[eje] - caja.min[eje]) / ancho) * 100 : 50;
    barra.value = Math.min(100, Math.max(0, v));
  }
}

function centrar() {
  if (!modelo.children.length) return;
  const caja = new THREE.Box3().setFromObject(modelo);
  const centro = caja.getCenter(new THREE.Vector3());
  const tamano = caja.getSize(new THREE.Vector3());
  const radio = Math.max(tamano.x, tamano.y, tamano.z) || 4;

  controles.target.copy(centro);
  camara.position.set(
    centro.x + radio * 1.6,
    centro.y + radio * 1.3,
    centro.z + radio * 1.9,
  );
  controles.update();
  sincronizarBarras();
}

// Cuál es la línea rota, para que repintar por otro motivo —elegir una pieza—
// no borre la marca.
let lineaRota = null;

function pintarGutter(fallo) {
  lineaRota = fallo;
  const total = areaCodigo.value.split('\n').length;
  let html = '';
  for (let i = 1; i <= total; i++) {
    // Se enciende una pieza, pero se marca su línea: es de donde ha salido.
    const elegida = seleccion !== null && i === seleccion.linea;
    const clase = i === fallo ? 'fallo' : (elegida ? 'elegida' : '');
    html += `<div class="${clase}">${i}</div>`;
  }
  gutter.innerHTML = html;
  gutter.scrollTop = areaCodigo.scrollTop;
}

let primeraVez = true;
// La consola lo consulta: si el código ya está roto, no puede culpar a la
// orden nueva de un error que venía de antes.
let codigoValido = true;

async function compilar() {
  let datos;
  try {
    const respuesta = await fetch('/api/modelo', {
      method: 'POST',
      body: areaCodigo.value,
    });
    datos = await respuesta.json();
  } catch (error) {
    estado.className = 'fallo';
    estado.textContent = 'No se pudo hablar con el servidor: ' + error.message;
    return;
  }

  codigoValido = datos.ok;
  if (datos.ok) {
    ultimoInventario = datos.inventario || null;
    const restantes = document.getElementById('restantes');
    if (ultimoInventario) {
      const quedan = ultimoInventario.total - ultimoInventario.usadas;
      restantes.hidden = false;
      restantes.textContent = 'tienes ' + quedan + ' piezas restantes de '
        + ultimoInventario.total;
      // En rojo cuando la caja no alcanza: quedan menos que cero.
      restantes.classList.toggle('agotado', quedan < 0);
    } else {
      // El catalogo basico no viene de ninguna caja.
      restantes.hidden = true;
    }
  }

  if (!datos.ok) {
    estado.className = 'fallo';
    estado.textContent = datos.linea
      ? `Línea ${datos.linea}: ${datos.mensaje}`
      : datos.mensaje;
    pintarGutter(datos.linea);
    return;
  }

  // Las mallas antes de dibujar: sin ellas saldrían cajas.
  await pedirMallas(datos.piezas.map((p) => p.malla));

  construir(datos.piezas);
  pintarGutter(null);
  const n = datos.piezas.length;
  let texto = `${datos.nombre} — ${n} ${n === 1 ? 'pieza' : 'piezas'}`;

  // Una pieza en el aire no es un error: se avisa y se sigue construyendo.
  if (datos.flotantes) {
    const f = datos.flotantes;
    texto += ` · ${f} ${f === 1 ? 'pieza' : 'piezas'} en el aire`;
  }
  // El inventario real: usar mas copias de un molde de las que trae la caja
  // se avisa —quiza hay dos cajas— pero no se calla.
  for (const a of datos.agotadas || []) {
    texto += ` · ${a.pieza}: usas ${a.usadas} y la caja trae ${a.hay}`;
  }
  estado.className = (datos.flotantes || (datos.agotadas || []).length) ? 'aviso' : '';
  estado.textContent = texto;

  if (primeraVez && n) {
    centrar();
    primeraVez = false;
  }
}

// --- Guardado -------------------------------------------------------------

let avisoTemporizador;

function guardarEnNavegador() {
  try {
    localStorage.setItem(CLAVE, areaCodigo.value);
  } catch (error) {
    // Modo privado o almacenamiento lleno: no es motivo para romper el editor,
    // pero el usuario debe saber que su código no se está guardando solo.
    estado.className = 'fallo';
    estado.textContent = 'No se pudo guardar en este navegador: ' + error.message;
    return;
  }
  avisoGuardado.classList.add('visible');
  clearTimeout(avisoTemporizador);
  avisoTemporizador = setTimeout(() => avisoGuardado.classList.remove('visible'), 900);
}

function nombreArchivo(extension) {
  const linea = areaCodigo.value.match(/^\s*modelo\s+"([^"]*)"/m);
  const base = (linea ? linea[1] : 'modelo').trim() || 'modelo';
  return base.replace(/[^\p{L}\p{N}._-]+/gu, '_') + extension;
}

function descargar(nombre, contenido, tipo) {
  const url = URL.createObjectURL(new Blob([contenido], { type: tipo }));
  const enlace = document.createElement('a');
  enlace.href = url;
  enlace.download = nombre;
  enlace.click();
  URL.revokeObjectURL(url);
}

// --- Eventos --------------------------------------------------------------

let temporizador;
function alEscribir() {
  pintarGutter(null);
  // El código se guarda aunque no compile: perder trabajo a medias sería peor
  // que perderlo terminado.
  guardarEnNavegador();
  clearTimeout(temporizador);
  temporizador = setTimeout(compilar, 400);
}

areaCodigo.addEventListener('input', alEscribir);
areaCodigo.addEventListener('scroll', () => { gutter.scrollTop = areaCodigo.scrollTop; });
document.getElementById('centrar').addEventListener('click', centrar);
document.getElementById('piezas').addEventListener('click', abrirPaleta);

// La mano: el clic izquierdo deja de orbitar y AGARRA el plano, como en un
// mapa. No es un modo nuevo del visor: es decirle a OrbitControls que el
// boton izquierdo desplace. Pinchar piezas sigue funcionando: un clic
// quieto no arrastra nada.
let manoActiva = false;
const botonMano = document.getElementById('mano');
function alternarMano(activa) {
  manoActiva = activa === undefined ? !manoActiva : activa;
  controles.mouseButtons.LEFT = manoActiva ? THREE.MOUSE.PAN : THREE.MOUSE.ROTATE;
  botonMano.classList.toggle('armada', manoActiva);
  lienzo.style.cursor = manoActiva ? 'grab' : '';
  sincronizarBarras();
}
botonMano.addEventListener('click', () => alternarMano());

// Ocultar el codigo para ver el diseño entero, sin distraccion. El texto
// sigue mandando —solo se esconde el panel— y el visor se queda el ancho.
const botonCodigo = document.getElementById('codigo-visible');
botonCodigo.addEventListener('click', () => {
  const editor = document.querySelector('.editor');
  editor.classList.toggle('oculto');
  botonCodigo.classList.toggle('armada', editor.classList.contains('oculto'));
  dispatchEvent(new Event('resize'));
});

// Sustituir lo escrito sin avisar sería destruir trabajo de un clic.
function puedoReemplazar() {
  return !areaCodigo.value.trim()
    || confirm('Se reemplazará el código actual. ¿Seguir?');
}

function reemplazar(codigo) {
  areaCodigo.value = codigo;
  guardarEnNavegador();
  primeraVez = true;
  compilar();
}

document.getElementById('nuevo').addEventListener('click', () => {
  if (!puedoReemplazar()) return;
  reemplazar('');
  areaCodigo.focus();
});

document.getElementById('ejemplo').addEventListener('click', async () => {
  if (!puedoReemplazar()) return;
  const r = await fetch('/api/ejemplo');
  reemplazar((await r.json()).codigo);
});

document.getElementById('guardar').addEventListener('click', () => {
  descargar(nombreArchivo('.blockcad'), areaCodigo.value, 'text/plain;charset=utf-8');
});

const entradaArchivo = document.getElementById('archivo');
document.getElementById('abrir').addEventListener('click', () => {
  if (!puedoReemplazar()) return;
  entradaArchivo.click();
});
entradaArchivo.addEventListener('change', async () => {
  const archivo = entradaArchivo.files[0];
  if (!archivo) return;
  let texto = await archivo.text();
  entradaArchivo.value = '';   // permite reabrir el mismo archivo

  // Abrir debe entender lo que este mismo editor escribe, y eso incluye el
  // JSON de "Exportar JSON". El servidor lo convierte de vuelta a código.
  if (texto.trimStart().startsWith('{')) {
    const respuesta = await fetch('/api/importar', { method: 'POST', body: texto });
    const datos = await respuesta.json();
    if (!datos.ok) {
      estado.className = 'fallo';
      estado.textContent = `No se pudo abrir ${archivo.name}: ${datos.mensaje}`;
      return;
    }
    texto = datos.codigo;
  }

  reemplazar(texto);
});

document.getElementById('exportar').addEventListener('click', async () => {
  const respuesta = await fetch('/api/json', { method: 'POST', body: areaCodigo.value });
  const datos = await respuesta.json();
  if (!datos.ok) {
    estado.className = 'fallo';
    estado.textContent = datos.linea
      ? `No se puede exportar. Línea ${datos.linea}: ${datos.mensaje}`
      : `No se puede exportar. ${datos.mensaje}`;
    pintarGutter(datos.linea);
    return;
  }
  descargar(nombreArchivo('.blockcad.json'), datos.json, 'application/json;charset=utf-8');
});

// --- Consola de órdenes ---------------------------------------------------

const areaOrden = document.getElementById('orden');
const consolaMensaje = document.getElementById('consola-mensaje');

// Deshacer de la consola: instantáneas del texto. El texto es el modelo, así
// que guardarlo entero es suficiente y no crea un segundo origen de la verdad.
const historial = { pasado: [], futuro: [] };
const TOPE = 100;

function registrar() {
  historial.pasado.push(areaCodigo.value);
  if (historial.pasado.length > TOPE) historial.pasado.shift();
  historial.futuro = [];
}

function decir(texto, clase = '') {
  consolaMensaje.textContent = texto;
  consolaMensaje.className = clase;
}

function aplicar(texto) {
  areaCodigo.value = texto;
  guardarEnNavegador();
  pintarGutter(null);
  compilar();
}

// Orden y descripción van en columnas de verdad. Alinearlas con espacios
// hacía que se leyeran como una sola frase, porque el CSS los colapsa.
const AYUDA = [
  ['ladrillo 2x4 en 0,0,0 color rojo', 'añade esa pieza al final'],
  ['ladrillo 2x2 encima color azul', 'la apoya sobre la pieza anterior'],
  ['ladrillo 2x4 en 0,0,0 llamado base', 'le pone nombre'],
  ['ladrillo 1x1 encima de base', 'la apoya sobre la pieza con ese nombre'],
  ['2780 en el agujero 2 de base', 'mete un pin o un eje por ese agujero'],
  ['32270 en el eje de trans', 'encaja un engranaje sobre ese eje'],
  ['un modelo entero', 'si lo pegas aquí, se carga en el editor'],
  ['borrar 7', 'borra la línea 7'],
  ['borrar ultima', 'borra la última pieza'],
  ['deshacer', 'deshace la última orden'],
  ['rehacer', 'la vuelve a aplicar'],
  ['centrar', 'encuadra la cámara'],
  ['limpiar', 'vacía el editor'],
  ['ayuda', 'esta lista'],
];

function mostrarAyuda() {
  consolaMensaje.className = 'ayuda';
  consolaMensaje.replaceChildren(...AYUDA.flatMap(([orden, que]) => {
    const codigo = document.createElement('code');
    codigo.textContent = orden;
    const texto = document.createElement('span');
    texto.textContent = que;
    return [codigo, texto];
  }));
}

function borrar(argumento) {
  const lineas = areaCodigo.value.split('\n');

  let indice;
  if (argumento === 'ultima' || argumento === 'última') {
    indice = lineas.findLastIndex((linea) => linea.trim());
  } else {
    const numero = Number.parseInt(argumento, 10);
    if (!Number.isInteger(numero)) {
      decir(`No entiendo qué borrar: ${argumento || '(nada)'}. Usa "borrar 7" o "borrar ultima".`, 'fallo');
      return;
    }
    indice = numero - 1;
  }

  if (indice < 0 || indice >= lineas.length) {
    decir(`No hay línea ${argumento} que borrar.`, 'fallo');
    return;
  }

  const borrada = lineas[indice].trim();
  registrar();
  lineas.splice(indice, 1);
  aplicar(lineas.join('\n'));
  decir(`Borrada la línea ${indice + 1}: ${borrada || '(vacía)'}`, 'hecho');
}

// Escribir "añade ladrillo 2x4 ..." es lo natural en una consola. El verbo
// sobra en el lenguaje, así que se descarta en vez de dar un error.
const VERBOS = /^(añade|anade|añadir|agrega|agregar|pon|poner|coloca|colocar)\s+/i;

// `catalogo` y `modelo` solo valen en las primeras líneas de un archivo, así
// que quien los manda no está añadiendo una pieza: está pegando un programa
// entero. Añadirlo al final del código lo dejaría en medio y daría un error
// que no dice nada ("debe ir en la primera línea", cuando en lo pegado sí lo
// está).
const ES_PROGRAMA = /^[ \t]*(catalogo|modelo)[ \t]+"/m;

async function anadirPiezas(entrada) {
  const texto = entrada
    .split('\n')
    .map((linea) => linea.replace(VERBOS, ''))
    .join('\n');

  const base = areaCodigo.value.replace(/\s+$/, '');
  const propuesta = base ? `${base}\n${texto}` : texto;

  // Si el código ya estaba roto no se puede culpar a lo nuevo; se añade sin
  // más. Si estaba bien y la propuesta falla, el fallo es de esta orden y no
  // se toca el editor.
  if (codigoValido) {
    const respuesta = await fetch('/api/modelo', { method: 'POST', body: propuesta });
    const datos = await respuesta.json();
    if (!datos.ok) {
      decir(datos.mensaje, 'fallo');
      return;
    }
  }

  registrar();
  aplicar(propuesta);
  areaOrden.value = '';
  const cuantas = texto.split('\n').filter((l) => l.trim()).length;
  decir(cuantas === 1 ? 'Añadida.' : `Añadidas ${cuantas} líneas.`, 'hecho');
}

async function enviar() {
  const texto = areaOrden.value.trim();
  if (!texto) return;

  // Un programa entero no se añade al final del código: lo sustituye. Es lo
  // que quiere quien pega un modelo completo en la consola.
  if (ES_PROGRAMA.test(texto)) {
    if (!puedoReemplazar()) return;
    registrar();
    reemplazar(texto);
    areaOrden.value = '';
    decir('Es un modelo completo, así que lo he cargado en el editor.', 'hecho');
    return;
  }

  const [primera, ...resto] = texto.split(/\s+/);
  const orden = primera.toLowerCase();
  const soloUna = !texto.includes('\n');

  if (soloUna && orden === 'ayuda') {
    mostrarAyuda();
    areaOrden.value = '';
  } else if (soloUna && orden === 'centrar') {
    centrar();
    decir('Cámara centrada.', 'hecho');
    areaOrden.value = '';
  } else if (soloUna && orden === 'limpiar') {
    if (!puedoReemplazar()) return;
    registrar();
    aplicar('');
    areaOrden.value = '';
    decir('Editor vacío. Puedes recuperarlo con "deshacer".', 'hecho');
  } else if (soloUna && orden === 'deshacer') {
    if (!historial.pasado.length) {
      decir('No hay ninguna orden que deshacer.', 'fallo');
      return;
    }
    historial.futuro.push(areaCodigo.value);
    aplicar(historial.pasado.pop());
    areaOrden.value = '';
    decir('Deshecho.', 'hecho');
  } else if (soloUna && orden === 'rehacer') {
    if (!historial.futuro.length) {
      decir('No hay nada que rehacer.', 'fallo');
      return;
    }
    historial.pasado.push(areaCodigo.value);
    aplicar(historial.futuro.pop());
    areaOrden.value = '';
    decir('Rehecho.', 'hecho');
  } else if (soloUna && orden === 'borrar') {
    borrar((resto[0] || '').toLowerCase());
    areaOrden.value = '';
  } else {
    await anadirPiezas(texto);
  }
}

// La caja crece con lo que se escriba. Con tres filas fijas, pegar un modelo
// de siete líneas ocultaba justo la de arriba, que es la que suele importar.
function ajustarCaja() {
  areaOrden.style.height = 'auto';
  areaOrden.style.height = `${Math.min(areaOrden.scrollHeight, 180)}px`;
}

async function enviarYAjustar() {
  await enviar();
  ajustarCaja();
}

document.getElementById('enviar').addEventListener('click', enviarYAjustar);
areaOrden.addEventListener('input', ajustarCaja);

// Enter envía; Mayúsculas+Enter hace un salto de línea, para mandar varias
// piezas de una vez.
areaOrden.addEventListener('keydown', (evento) => {
  if (evento.key === 'Enter' && !evento.shiftKey) {
    evento.preventDefault();
    enviarYAjustar();
  }
});

// El tabulador debe indentar, no saltar de campo: el lenguaje usa bloques.
areaCodigo.addEventListener('keydown', (evento) => {
  if (evento.key !== 'Tab') return;
  evento.preventDefault();
  const inicio = areaCodigo.selectionStart;
  const fin = areaCodigo.selectionEnd;
  areaCodigo.value = areaCodigo.value.slice(0, inicio) + '    ' + areaCodigo.value.slice(fin);
  areaCodigo.selectionStart = areaCodigo.selectionEnd = inicio + 4;
  alEscribir();
});

function ajustar() {
  const ancho = lienzo.clientWidth;
  const alto = lienzo.clientHeight;
  if (!ancho || !alto) return;
  renderer.setSize(ancho, alto, false);
  camara.aspect = ancho / alto;
  camara.updateProjectionMatrix();
}
addEventListener('resize', ajustar);

function bucle() {
  requestAnimationFrame(bucle);
  ajustar();
  controles.update();
  renderer.render(escena, camara);
}
bucle();

// Al abrir, mandan tus cambios: el ejemplo solo aparece la primera vez.
async function arrancar() {
  let guardado = null;
  try {
    guardado = localStorage.getItem(CLAVE);
  } catch (error) {
    guardado = null;
  }

  // `null` es «nunca has usado el editor» y trae el ejemplo. Una cadena
  // vacía es «pulsaste Nuevo», y entonces el lienzo debe seguir en blanco.
  if (guardado !== null) {
    areaCodigo.value = guardado;
  } else {
    const respuesta = await fetch('/api/ejemplo');
    areaCodigo.value = (await respuesta.json()).codigo;
  }
  compilar();
}
arrancar();
</script>
</body>
</html>
